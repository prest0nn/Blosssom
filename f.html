<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grumpy Monkey</title>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --monkey-brown: #6d4c41;
            --face-tan: #d7ccc8;
            --accent-pink: #ff8a80;
            --dark-text: #2c3e50;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* --- Speech Bubble --- */
        .bubble {
            position: absolute;
            top: -100px;
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 25px var(--shadow);
            font-weight: 800;
            color: var(--dark-text);
            font-size: 1.2rem;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 10;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }

        .bubble.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --- Monkey Container --- */
        .monkey {
            width: 200px;
            height: 200px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .head {
            width: 100%;
            height: 100%;
            background: var(--monkey-brown);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .ear {
            width: 60px;
            height: 60px;
            background: var(--monkey-brown);
            position: absolute;
            top: 60px;
            border-radius: 50%;
            z-index: 1;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.1);
        }

        .ear.left { left: -25px; }
        .ear.right { right: -25px; }

        .ear::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 35px;
            background: var(--face-tan);
            border-radius: 50%;
            top: 12.5px;
            left: 12.5px;
            opacity: 0.6;
        }

        /* --- Face Features --- */
        .face-mask {
            width: 160px;
            height: 110px;
            background: var(--face-tan);
            position: absolute;
            bottom: 15px;
            left: 20px;
            border-radius: 50% 50% 45% 45%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eyes-container {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        .eye {
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .pupil {
            width: 14px;
            height: 14px;
            background: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 7px;
            left: 7px;
        }

        .brow {
            width: 30px;
            height: 4px;
            background: var(--monkey-brown);
            position: absolute;
            top: 18px;
            border-radius: 2px;
            transition: transform 0.3s ease;
        }

        .brow.left { left: 40px; }
        .brow.right { right: 40px; }

        .nose {
            width: 14px;
            height: 8px;
            background: #a1887f;
            border-radius: 10px;
            margin-top: 15px;
        }

        .mouth {
            width: 40px;
            height: 2px;
            background: #8d6e63;
            margin-top: 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        /* --- States --- */
        .angry .brow.left { transform: rotate(15deg) translateY(5px); }
        .angry .brow.right { transform: rotate(-15deg) translateY(5px); }
        .angry .mouth {
            height: 15px;
            width: 50px;
            background: #333;
            border-radius: 50% 50% 10% 10%;
        }

        /* --- Button --- */
        .btn {
            padding: 18px 40px;
            background: var(--monkey-brown);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--shadow);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--shadow);
            background: #5d4037;
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="bubble" id="bubble">F*CK U!</div>

        <div class="monkey" id="monkey">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="head">
                <div class="brow left"></div>
                <div class="brow right"></div>
                <div class="face-mask">
                    <div class="eyes-container">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="nose"></div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
        </div>

        <button class="btn" id="btn">DON'T CLICK ME</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const bubble = document.getElementById('bubble');
        const monkey = document.getElementById('monkey');
        const pupils = document.querySelectorAll('.pupil');

        // Smooth Eye Tracking
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            pupils.forEach(pupil => {
                const rect = pupil.getBoundingClientRect();
                const pupilX = rect.left + rect.width / 2;
                const pupilY = rect.top + rect.height / 2;

                const angle = Math.atan2(mouseY - pupilY, mouseX - pupilX);
                const distance = Math.min(6, Math.hypot(mouseX - pupilX, mouseY - pupilY) / 50);

                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                pupil.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Trigger Action
        btn.addEventListener('click', () => {
            bubble.classList.add('active');
            monkey.classList.add('angry');
            monkey.style.transform = "scale(1.1) translateY(-15px)";

            setTimeout(() => {
                bubble.classList.remove('active');
                monkey.classList.remove('angry');
                monkey.style.transform = "scale(1) translateY(0)";
            }, 2000);
        });
    </script>
</body>
</html>
