<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepsi | Refresh Your World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        :root {
            --pepsi-blue: #005cb4;
            --pepsi-red: #ef3340;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        .hero { background: var(--pepsi-blue); }
        .feature { background: #fff; color: #333; }
        .footer { background: var(--pepsi-red); }

        .title {
            font-size: 8vw;
            text-transform: uppercase;
            z-index: 2;
        }

        /* The Animated Image Container */
        .image-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            z-index: 5;
            pointer-events: none; /* Let clicks pass through to buttons */
        }

        .pepsi-can {
            width: 100%;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="https://www.pepsi.com/en-us/assets/images/can-pepsi.png" alt="Pepsi Can" class="pepsi-can" id="can">
    </div>

    <section class="hero">
        <h1 class="title">REELAW</h1>
        <div class="scroll-hint">SCROLL DOWN</div>
    </section>

    <section class="feature">
        <h1 class="title" style="color: var(--pepsi-blue);">ZERO SUGAR</h1>
    </section>

    <section class="footer">
        <h1 class="title">MAX TASTE</h1>
    </section>

    <script>
        // Register the ScrollTrigger plugin
        gsap.registerPlugin(ScrollTrigger);

        // 1. Initial State (Hide the can slightly or set its starting scale)
        gsap.set("#can", { scale: 0.8, rotation: -15 });

        // 2. The Main Scroll Animation
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1, // '1' makes the animation "catch up" to the scroll for smoothness
            }
        });

        tl.to("#can", {
            rotation: 360,     // Rotate the can as we scroll
            scale: 1.2,       // Zoom in slightly
            y: 50,            // Move it down a bit
            duration: 1
        })
        .to("#can", {
            rotation: 720,    // Spin it more for the final section
            x: 200,           // Slide it to the side
            scale: 0.9,
            duration: 1
        });

        // 3. Optional: Smoothly fade titles in as they appear
        gsap.utils.toArray(".title").forEach(title => {
            gsap.from(title, {
                scrollTrigger: {
                    trigger: title,
                    start: "top 80%",
                    toggleActions: "play none none reverse"
                },
                opacity: 0,
                y: 50,
                duration: 1
            });
        });
    </script>
</body>
</html>
