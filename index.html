<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault of Blossom 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=swap');

        :root {
            --accent: oklch(75% 0.18 350);
            --bg: oklch(10% 0.02 260);
            --panel: oklch(100% 0 0 / 0.03);
            --border: oklch(100% 0 0 / 0.1);
            --glow: oklch(75% 0.18 350 / 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            height: 100vh;
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            color: #fff;
            display: grid;
            place-items: center;
        }

        /* 1. Neural Particle System */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* 2. Biometric Laser */
        #scanner-line {
            position: fixed;
            top: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            z-index: 200;
            display: none;
        }

        /* Sexy Cursor Spotlight */
        #cursor-glow {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(circle 250px at var(--x, 50%) var(--y, 50%), var(--glow), transparent 80%);
        }

        /* Overlays & Lock Screens */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card {
            background: var(--panel);
            padding: 3rem;
            border-radius: 48px;
            border: 1px solid var(--border);
            backdrop-filter: blur(60px);
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
            position: relative;
            width: min(92%, 500px);
        }

        .glass-card::before {
            content: ""; position: absolute; inset: 0; padding: 1px; border-radius: 48px;
            background: linear-gradient(135deg, var(--border), var(--accent), var(--border));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; opacity: 0.4;
        }

        input {
            all: unset;
            width: 220px;
            padding: 15px;
            margin-top: 25px;
            font-size: 3.5rem;
            letter-spacing: 15px;
            border-bottom: 2px solid var(--border);
            text-align: center;
            color: var(--accent);
            font-weight: 800;
        }

        /* Main Content */
        .main-container {
            z-index: 10;
            display: none;
            animation: cardEntrance 1s ease-out forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #text-box { font-size: 1.5rem; font-weight: 200; min-height: 180px; display: flex; align-items: center; justify-content: center; text-wrap: balance; }

        .btn {
            all: unset; display: block; width: 100%; padding: 1.1rem 0; margin-top: 1.5rem;
            background: #fff; color: #000; border-radius: 20px; font-weight: 600;
            cursor: pointer; text-align: center; transition: 0.3s;
        }
        .btn:hover { background: var(--accent); transform: translateY(-3px); }

        /* Board & Inputs */
        canvas#sig-pad {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            width: 100%;
            height: 180px;
            margin: 20px 0;
            touch-action: none;
        }

        textarea {
            width: 100%; height: 100px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); border-radius: 18px; padding: 15px;
            color: #fff; font-family: inherit; resize: none; margin-top: 15px;
        }

        .vault-box { background: rgba(0,0,0,0.2); border-radius: 24px; padding: 20px; margin-top: 20px; border: 1px solid var(--border); text-align: left; }
        
        @keyframes scan { from { top: 0%; opacity: 1; } to { top: 100%; opacity: 0; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div id="cursor-glow"></div>
    <div id="scanner-line"></div>

    <div id="master-lock" class="overlay">
        <div class="glass-card">
            <h2 id="time-greet" style="font-size: 0.7rem; letter-spacing: 5px; color: var(--accent);">INITIALIZING...</h2>
            <input type="password" id="pass-input" maxlength="4" placeholder="••••">
            <p style="font-size: 0.6rem; margin-top: 15px; opacity: 0.4;">VAULT ACCESS REQUIRED</p>
        </div>
    </div>

    <audio id="bg-track" loop><source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030c.mp3" type="audio/mpeg"></audio>

    <div class="main-container" id="vault-blossom">
        <div class="glass-card">
            <div id="text-box">Identity Confirmed. Ready to start?</div>
            <button id="start-btn" class="btn">Initiate Sequence</button>
            
            <div id="blossom-controls" class="hidden">
                <p style="font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); margin-top: 20px;">SEAL OF FRIENDSHIP</p>
                <canvas id="sig-pad"></canvas>
                <textarea id="reply-to-you" placeholder="Write your message back to him here..."></textarea>
                <button onclick="save('blossom_reply', 'reply-to-you')" class="btn" style="background: var(--accent);">Synchronize Data ❤️</button>
            </div>
        </div>
    </div>

    <div class="main-container" id="vault-deep">
        <div class="glass-card">
            <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--accent);">Obsidian Dashboard</h2>
            
            <div class="vault-box">
                <p style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px;">HER DECRYPTED REPLY</p>
                <p id="her-reply-text" style="margin-top: 10px; font-style: italic; opacity: 0.8;">(Waiting for synchronization...)</p>
            </div>

            <div class="vault-box">
                <p style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px;">YOUR PRIVATE VAULT NOTE</p>
                <textarea id="deep-note-input" placeholder="Something only 2026 reveals..."></textarea>
                <button onclick="save('deep_note', 'deep-note-input')" class="btn" style="background: var(--accent);">Secure Update</button>
            </div>

            <button onclick="location.reload()" class="btn" style="background: transparent; border: 1px solid var(--border); color: #fff; font-size: 0.8rem;">Close Vault</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('pass-input');
        const lock = document.getElementById('master-lock');
        const scanner = document.getElementById('scanner-line');
        const music = document.getElementById('bg-track');

        // 1. Time-Aware Greeting
        const hour = new Date().getHours();
        document.getElementById('time-greet').innerText = hour < 12 ? "GOOD MORNING, BLOSSOM" : hour < 18 ? "GOOD AFTERNOON, BLOSSOM" : "GOOD EVENING, BLOSSOM";

        // 2. Neural Particle System
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        function initP() {
            pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
            for(let i=0; i<50; i++) particles.push({ x: Math.random()*pCanvas.width, y: Math.random()*pCanvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 });
        }
        function drawP() {
            pCtx.clearRect(0,0,pCanvas.width, pCanvas.height);
            pCtx.fillStyle = "rgba(255,255,255,0.15)";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>pCanvas.width) p.vx*=-1; if(p.y<0 || p.y>pCanvas.height) p.vy*=-1;
                pCtx.beginPath(); pCtx.arc(p.x, p.y, 1, 0, Math.PI*2); pCtx.fill();
            });
            requestAnimationFrame(drawP);
        }
        initP(); drawP();

        // 3. Cursor Tracking
        window.addEventListener('mousemove', e => {
            document.getElementById('cursor-glow').style.setProperty('--x', `${e.clientX}px`);
            document.getElementById('cursor-glow').style.setProperty('--y', `${e.clientY}px`);
        });

        // 4. Master Entrance
        input.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val === '2025' || val === '2026') {
                input.blur();
                scanner.style.display = 'block';
                scanner.style.animation = 'scan 1.2s forwards';
                
                setTimeout(() => {
                    lock.style.opacity = '0';
                    setTimeout(() => {
                        lock.style.display = 'none';
                        if(val === '2025') {
                            document.getElementById('vault-blossom').style.display = 'block';
                        } else {
                            document.getElementById('vault-deep').style.display = 'block';
                            loadVaultData();
                        }
                        confetti({ particleCount: 100, spread: 70 });
                    }, 800);
                }, 1200);
            }
        });

        // 5. Story Logic (2025)
        const story = ["Hi Blossom...", "They say digital spaces are cold,", "But this one is warm because you're in it.", "You're a real gem. Thank you for being you. 🌸"];
        let sIdx = 0;
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-btn').style.display = 'none';
            music.volume = 0.2; music.play();
            const interval = setInterval(() => {
                if(sIdx < story.length) {
                    const box = document.getElementById('text-box');
                    box.style.opacity = 0;
                    setTimeout(() => {
                        box.innerText = story[sIdx];
                        box.style.opacity = 1;
                        sIdx++;
                    }, 500);
                } else {
                    clearInterval(interval);
                    document.getElementById('text-box').innerHTML = "<span style='font-family:Dancing Script; font-size:2.8rem; color:var(--accent)'>Over to you!</span>";
                    document.getElementById('blossom-controls').classList.remove('hidden');
                    initSig();
                }
            }, 3500);
        };

        // 6. Signature Pad Logic
        function initSig() {
            const pad = document.getElementById('sig-pad');
            const sCtx = pad.getContext('2d');
            pad.width = pad.offsetWidth; pad.height = pad.offsetHeight;
            let draw = false;
            const getXY = (e) => {
                const r = pad.getBoundingClientRect();
                return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top };
            };
            pad.onmousedown = pad.ontouchstart = (e) => { draw = true; sCtx.beginPath(); const p = getXY(e); sCtx.moveTo(p.x, p.y); };
            pad.onmousemove = pad.ontouchmove = (e) => { if(draw) { const p = getXY(e); sCtx.lineTo(p.x, p.y); sCtx.strokeStyle="#000"; sCtx.lineWidth=3; sCtx.stroke(); } };
            window.onmouseup = window.ontouchend = () => draw = false;
        }

        // 7. Data Handling
        function save(key, id) {
            localStorage.setItem(key, document.getElementById(id).value);
            if(key === 'blossom_reply') localStorage.setItem('blossom_sig', document.getElementById('sig-pad').toDataURL());
            confetti({ particleCount: 50, origin: { y: 0.8 } });
            alert("Vault Synchronized. ✨");
        }

        function loadVaultData() {
            const reply = localStorage.getItem('blossom_reply');
            if(reply) document.getElementById('her-reply-text').innerText = `"${reply}"`;
            const deep = localStorage.getItem('deep_note');
            if(deep) document.getElementById('deep-note-input').value = deep;
        }
    </script>
</body>
</html>
