<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Blossom 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');

        :root {
            /* 2026 Color Science: OKLCH for "Glowing" vibrance */
            --accent: oklch(78% 0.16 350);
            --bg: oklch(10% 0.02 260);
            --card-glass: oklch(100% 0 0 / 0.03);
            --border: oklch(100% 0 0 / 0.1);
            --text-muted: oklch(70% 0.02 260);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: var(--bg);
            /* Ultra-Modern Mesh Gradient */
            background-image: 
                radial-gradient(at 0% 0%, oklch(20% 0.08 260) 0, transparent 50%), 
                radial-gradient(at 100% 0%, oklch(15% 0.1 350) 0, transparent 50%),
                radial-gradient(at 50% 100%, oklch(12% 0.05 280) 0, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        #spotlight {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), oklch(100% 0 0 / 0.06) 0%, transparent 25%);
        }

        /* Access Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-lock {
            background: var(--card-glass);
            padding: 4rem;
            border-radius: 48px;
            border: 1px solid var(--border);
            backdrop-filter: blur(60px);
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8);
        }

        input {
            all: unset;
            width: 220px;
            padding: 15px;
            margin-top: 30px;
            font-size: 3rem;
            letter-spacing: 15px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            color: var(--accent);
            font-weight: 800;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); }

        /* Main Glass Container */
        .card {
            width: min(92%, 520px);
            padding: 3rem;
            background: var(--card-glass);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 56px;
            z-index: 10;
            position: relative;
            box-shadow: inset 0 0 0 1px oklch(100% 0 0 / 0.05);
        }

        #text-display {
            font-size: 1.6rem;
            font-weight: 200;
            line-height: 1.5;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-wrap: balance;
            transition: all 0.8s ease;
        }

        .cta-btn {
            all: unset;
            width: 100%;
            padding: 1.2rem 0;
            margin-top: 2rem;
            background: #fff;
            color: #000;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cta-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: var(--accent);
            box-shadow: 0 20px 40px oklch(78% 0.16 350 / 0.3);
        }

        /* Signing and Reply Sections */
        canvas {
            background: oklch(100% 0 0 / 0.95);
            border-radius: 32px;
            width: 100%;
            height: 220px;
            margin: 20px 0;
            touch-action: none;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: oklch(100% 0 0 / 0.05);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            color: #fff;
            font-family: inherit;
            resize: none;
            margin: 15px 0;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--accent); outline: none; background: oklch(100% 0 0 / 0.08); }

        .hidden { display: none !important; }
        .fade-out { opacity: 0; transform: scale(0.9) translateY(20px); }
        
        #reply-content {
            background: oklch(100% 0 0 / 0.04);
            padding: 25px;
            border-radius: 28px;
            border: 1px solid var(--border);
            font-style: italic;
            line-height: 1.6;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .reveal-anim { animation: reveal 1s forwards; }
    </style>
</head>
<body>

    <div id="spotlight"></div>

    <div id="lock1" class="overlay">
        <div class="bento-lock">
            <h2 style="font-weight: 200; letter-spacing: 5px; font-size: 0.8rem; color: var(--text-muted);">UNFOLD PRIVACY</h2>
            <input type="password" id="code1" maxlength="4" placeholder="••••">
        </div>
    </div>

    <div id="lock2" class="overlay hidden">
        <div class="bento-lock">
            <h2 style="font-weight: 200; letter-spacing: 5px; font-size: 0.8rem; color: var(--accent);">IDENTITY VERIFICATION</h2>
            <p style="font-size: 0.7rem; margin-top: 5px; opacity: 0.5;">Enter code to decrypt message</p>
            <input type="password" id="code2" maxlength="4" placeholder="••••">
            <p onclick="document.getElementById('lock2').classList.add('hidden')" style="margin-top: 20px; cursor: pointer; font-size: 0.7rem; opacity: 0.4;">Back</p>
        </div>
    </div>

    <audio id="bg-track" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030c.mp3" type="audio/mpeg">
    </audio>

    <div class="card hidden" id="main-card">
        <div id="text-display">Validation successful.</div>
        <button id="start-btn" class="cta-btn">Initiate Sequence</button>

        <div id="interactive-zones" class="hidden reveal-anim">
            <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--text-muted); text-align: left; margin-left: 10px;">SEAL OF RECORD</p>
            <canvas id="canvas"></canvas>
            
            <div id="reply-input-section">
                <textarea id="reply-text" placeholder="Your words for him..."></textarea>
                <button id="send-reply" class="cta-btn" style="background: var(--accent);">Synchronize Data ❤️</button>
            </div>

            <div id="reply-view-section" class="hidden" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem;">
                <button id="view-reply-btn" class="cta-btn" style="background: transparent; border: 1px solid var(--border); color: #fff;">Access Stored Memory 🔒</button>
                <div id="reply-display" class="hidden">
                    <div id="reply-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('text-display');
        const music = document.getElementById('bg-track');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Mouse Tracker
        window.addEventListener('mousemove', e => {
            document.getElementById('spotlight').style.setProperty('--x', `${e.clientX}px`);
            document.getElementById('spotlight').style.setProperty('--y', `${e.clientY}px`);
        });

        // Entrance (2025)
        document.getElementById('code1').addEventListener('input', (e) => {
            if (e.target.value === '2025') {
                document.getElementById('lock1').classList.add('fade-out');
                setTimeout(() => { 
                    document.getElementById('lock1').classList.add('hidden'); 
                    document.getElementById('main-card').classList.remove('hidden'); 
                }, 800);
            }
        });

        // Secret View (2026)
        document.getElementById('view-reply-btn').onclick = () => {
            document.getElementById('lock2').classList.remove('hidden');
            document.getElementById('code2').focus();
        };

        document.getElementById('code2').addEventListener('input', (e) => {
            if (e.target.value === '2026') {
                document.getElementById('lock2').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('lock2').classList.add('hidden');
                    document.getElementById('view-reply-btn').classList.add('hidden');
                    document.getElementById('reply-display').classList.remove('hidden');
                    document.getElementById('reply-content').innerText = localStorage.getItem('blossom_reply');
                    confetti({ particleCount: 60, spread: 80, colors: ['#ffffff', '#ff9a9e'] });
                }, 800);
            }
        });

        const story = [
            "Hi Blossom...",
            "In an age of endless digital noise,",
            "Our friendship is the only frequency that matters.",
            "Your energy is rare. Your presence is intentional.",
            "I built this space just to say...",
            "I'm grateful for every moment we share. 🌸"
        ];

        let i = 0;
        function playStory() {
            if (i < story.length) {
                display.style.opacity = 0;
                display.style.transform = "translateY(10px)";
                setTimeout(() => {
                    display.innerText = story[i];
                    display.style.opacity = 1;
                    display.style.transform = "translateY(0)";
                    i++;
                    setTimeout(playStory, 3800);
                }, 800);
            } else {
                finalize();
            }
        }

        function finalize() {
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
            display.style.fontFamily = "'Dancing Script', cursive";
            display.style.fontSize = "2.8rem";
            display.style.color = "var(--accent)";
            display.innerText = "Over to you!";
            document.getElementById('interactive-zones').classList.remove('hidden');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            if (localStorage.getItem('blossom_reply')) {
                document.getElementById('reply-view-section').classList.remove('hidden');
            }
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-btn').classList.add('hidden');
            music.volume = 0.2; music.play();
            playStory();
        };

        // Signature logic (Refined for 2026)
        let draw = false;
        const getXY = (e) => {
            const r = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - r.left;
            const y = (e.clientY || e.touches[0].clientY) - r.top;
            return { x, y };
        };
        canvas.onmousedown = canvas.ontouchstart = (e) => { 
            draw = true; ctx.beginPath(); 
            const p = getXY(e); ctx.moveTo(p.x, p.y); 
        };
        canvas.onmousemove = canvas.ontouchmove = (e) => { 
            if(draw) { const p = getXY(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = "#111"; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke(); }
        };
        window.onmouseup = window.ontouchend = () => draw = false;

        document.getElementById('send-reply').onclick = () => {
            localStorage.setItem('blossom_reply', document.getElementById('reply-text').value);
            localStorage.setItem('blossom_seal', canvas.toDataURL());
            confetti({ particleCount: 100, spread: 100 });
            alert("Frequency Synced. Memory Stored. ❤️");
            location.reload();
        };
    </script>
</body>
</html>
