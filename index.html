<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Blossom 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');

        :root {
            --accent: oklch(78% 0.16 350);
            --bg: oklch(8% 0.02 260);
            --glass: oklch(100% 0 0 / 0.03);
            --border: oklch(100% 0 0 / 0.1);
            --laser: oklch(78% 0.16 350 / 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100vh;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            color: #fff;
            display: grid;
            place-items: center;
        }

        /* Neural Particle Canvas */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Biometric Scanner Line */
        #scanner-line {
            position: fixed;
            top: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--laser), 0 0 40px var(--laser);
            z-index: 200;
            display: none;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-lock {
            background: var(--glass);
            padding: 3.5rem;
            border-radius: 48px;
            border: 1px solid var(--border);
            backdrop-filter: blur(80px);
            text-align: center;
            z-index: 101;
        }

        input {
            all: unset;
            width: 220px;
            padding: 15px;
            margin-top: 30px;
            font-size: 3rem;
            letter-spacing: 15px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            color: var(--accent);
            font-weight: 800;
        }

        /* Main Experience Card */
        .card {
            width: min(92%, 520px);
            padding: 3rem;
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 56px;
            z-index: 10;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: all 1s ease;
        }

        .card.active { transform: scale(1); opacity: 1; }

        #text-display {
            font-size: 1.5rem;
            font-weight: 200;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .cta-btn {
            all: unset;
            width: 100%;
            padding: 1.2rem 0;
            margin-top: 2rem;
            background: #fff;
            color: #000;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .cta-btn:hover { background: var(--accent); transform: translateY(-3px); }

        canvas#sig-pad {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            width: 100%;
            height: 200px;
            margin: 20px 0;
            touch-action: none;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            color: #fff;
            resize: none;
            margin-bottom: 15px;
        }

        .hidden { display: none !important; }

        @keyframes scan {
            0% { top: 0%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div id="scanner-line"></div>

    <div id="lock1" class="overlay">
        <div class="bento-lock">
            <h2 id="greeting" style="font-weight: 200; font-size: 0.7rem; letter-spacing: 4px; color: var(--accent);">INITIALIZING...</h2>
            <input type="password" id="code1" maxlength="4" placeholder="••••">
        </div>
    </div>

    <div id="lock2" class="overlay hidden">
        <div class="bento-lock">
            <h2 style="font-weight: 200; font-size: 0.7rem; letter-spacing: 4px;">DECRYPTING MESSAGE</h2>
            <input type="password" id="code2" maxlength="4" placeholder="••••">
            <p onclick="document.getElementById('lock2').classList.add('hidden')" style="margin-top: 15px; font-size: 0.6rem; cursor: pointer; opacity: 0.5;">CANCEL</p>
        </div>
    </div>

    <audio id="bg-track" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030c.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="main-card">
        <div id="text-display">Verification Pending...</div>
        <button id="start-btn" class="cta-btn">Begin Journey</button>

        <div id="interactive-zones" class="hidden">
            <canvas id="sig-pad"></canvas>
            <textarea id="reply-text" placeholder="Type a message back..."></textarea>
            <button id="send-reply" class="cta-btn" style="background: var(--accent);">Synchronize ❤️</button>
            
            <div id="reply-view-section" class="hidden">
                <button id="view-reply-btn" class="cta-btn" style="background: transparent; border: 1px solid var(--border); color: #fff;">View Stored Reply 🔒</button>
                <div id="reply-display" class="hidden" style="margin-top: 20px; font-style: italic; border-top: 1px solid var(--border); padding-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        const scanner = document.getElementById('scanner-line');
        const code1 = document.getElementById('code1');
        const card = document.getElementById('main-card');
        const display = document.getElementById('text-display');
        const music = document.getElementById('bg-track');

        // 1. Time-Aware Greeting
        const hour = new Date().getHours();
        const greetText = hour < 12 ? "GOOD MORNING, BLOSSOM" : hour < 18 ? "GOOD AFTERNOON, BLOSSOM" : "GOOD EVENING, BLOSSOM";
        document.getElementById('greeting').innerText = greetText;

        // 2. Neural Particle System
        let particles = [];
        function initParticles() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * pCanvas.width,
                    y: Math.random() * pCanvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
        }
        function drawParticles() {
            pCtx.clearRect(0,0,pCanvas.width, pCanvas.height);
            pCtx.fillStyle = "rgba(255,255,255,0.2)";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > pCanvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > pCanvas.height) p.vy *= -1;
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                pCtx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        initParticles(); drawParticles();

        // 3. Biometric Entrance (2025)
        code1.addEventListener('input', (e) => {
            if (e.target.value === '2025') {
                code1.blur();
                scanner.style.display = 'block';
                scanner.style.animation = 'scan 1.5s forwards';
                
                setTimeout(() => {
                    document.getElementById('lock1').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('lock1').classList.add('hidden');
                        card.classList.add('active');
                        display.innerText = "Identity Verified. System Online.";
                    }, 800);
                }, 1500);
            }
        });

        // 4. Story Logic
        const story = [
            "Hi Blossom...",
            "Checking the system logs...",
            "Found: One incredible person.",
            "In this fast world, you are my favorite highlight.",
            "Thank you for being you. 🌸"
        ];
        
        let sIdx = 0;
        function runStory() {
            if(sIdx < story.length) {
                display.style.opacity = 0;
                setTimeout(() => {
                    display.innerText = story[sIdx];
                    display.style.opacity = 1;
                    sIdx++;
                    setTimeout(runStory, 3500);
                }, 800);
            } else {
                showInteractive();
            }
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-btn').classList.add('hidden');
            music.volume = 0.3; music.play();
            runStory();
        };

        // 5. Signature & Reply System
        const sigPad = document.getElementById('sig-pad');
        const sCtx = sigPad.getContext('2d');
        function showInteractive() {
            confetti({ particleCount: 150, spread: 70 });
            display.innerText = "Grateful For You!";
            display.style.fontFamily = "'Dancing Script', cursive";
            display.style.fontSize = "2.5rem";
            document.getElementById('interactive-zones').classList.remove('hidden');
            sigPad.width = sigPad.offsetWidth;
            sigPad.height = sigPad.offsetHeight;
            if(localStorage.getItem('blossom_reply')) document.getElementById('reply-view-section').classList.remove('hidden');
        }

        let drawing = false;
        sigPad.onmousedown = sigPad.ontouchstart = (e) => {
            drawing = true; sCtx.beginPath();
            const r = sigPad.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - r.left;
            const y = (e.clientY || e.touches[0].clientY) - r.top;
            sCtx.moveTo(x, y);
        };
        sigPad.onmousemove = sigPad.ontouchmove = (e) => {
            if(!drawing) return;
            const r = sigPad.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - r.left;
            const y = (e.clientY || e.touches[0].clientY) - r.top;
            sCtx.lineTo(x, y); sCtx.strokeStyle = "#000"; sCtx.lineWidth = 3; sCtx.stroke();
        };
        window.onmouseup = window.ontouchend = () => drawing = false;

        document.getElementById('send-reply').onclick = () => {
            localStorage.setItem('blossom_reply', document.getElementById('reply-text').value);
            alert("Data Synced. ❤️");
            location.reload();
        };

        // View Reply (2026)
        document.getElementById('view-reply-btn').onclick = () => {
            document.getElementById('lock2').classList.remove('hidden');
        };
        document.getElementById('code2').addEventListener('input', (e) => {
            if(e.target.value === '2026') {
                document.getElementById('lock2').classList.add('hidden');
                document.getElementById('view-reply-btn').classList.add('hidden');
                document.getElementById('reply-display').classList.remove('hidden');
                document.getElementById('reply-display').innerText = localStorage.getItem('blossom_reply');
            }
        });
    </script>
</body>
</html>
