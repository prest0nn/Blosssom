<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Obsidian Vault | For Blossom 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;800&display=swap');

        /* PREMIUM DESIGN SYSTEM (2026)
           Using OKLCH for superior color depth and vibrancy
        */
        :root {
            --accent-primary: oklch(75% 0.18 350);
            --accent-secondary: oklch(65% 0.25 330);
            --bg-deep: oklch(8% 0.02 260);
            --bg-surface: oklch(12% 0.03 260);
            --glass-core: oklch(100% 0 0 / 0.03);
            --glass-stroke: oklch(100% 0 0 / 0.12);
            --text-main: oklch(98% 0.01 260);
            --text-dim: oklch(65% 0.02 260);
            --error: oklch(60% 0.2 25);
            --success: oklch(75% 0.15 150);
        }

        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            height: 100dvh;
            background-color: var(--bg-deep);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* BACKGROUND ENGINE LAYER */
        #particle-engine {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #dynamic-spotlight {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(
                circle 300px at var(--mouse-x, 50%) var(--mouse-y, 50%),
                oklch(75% 0.18 350 / 0.08),
                transparent 80%
            );
        }

        /* BIOMETRIC SCANNER OVERLAY */
        #biometric-scanner {
            position: fixed;
            top: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-primary);
            z-index: 999;
            box-shadow: 0 0 15px var(--accent-primary), 0 0 30px var(--accent-primary);
            opacity: 0;
            pointer-events: none;
        }

        /* LOCK SCREEN INTERFACE 
           Z-Index set high to prevent background blocking
        */
        .access-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.8s ease;
        }

        .auth-card {
            background: var(--glass-core);
            backdrop-filter: blur(80px) saturate(180%);
            padding: 4rem 3rem;
            border-radius: 60px;
            border: 1px solid var(--glass-stroke);
            text-align: center;
            width: min(90%, 460px);
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
        }

        .auth-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, var(--glass-stroke), var(--accent-primary), var(--glass-stroke));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        .status-label {
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: var(--accent-primary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 2rem;
            display: block;
        }

        .passcode-input {
            all: unset;
            width: 100%;
            font-size: 4rem;
            letter-spacing: 24px;
            text-align: center;
            color: var(--text-main);
            font-weight: 800;
            border-bottom: 2px solid var(--glass-stroke);
            padding-bottom: 10px;
            transition: border-color 0.4s ease;
            cursor: text;
        }

        .passcode-input:focus {
            border-color: var(--accent-primary);
        }

        /* MAIN VAULT ARCHITECTURE
        */
        .vault-container {
            position: relative;
            z-index: 100;
            width: min(94%, 540px);
            display: none;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .vault-container.active {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .glass-module {
            background: var(--glass-core);
            backdrop-filter: blur(40px);
            border-radius: 44px;
            border: 1px solid var(--glass-stroke);
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        #narrative-engine {
            font-size: 1.6rem;
            font-weight: 300;
            line-height: 1.5;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-main);
            transition: opacity 0.6s ease;
        }

        /* SIGNATURE ENGINE */
        .signature-module {
            margin-top: 2rem;
            text-align: center;
        }

        canvas#signature-pad {
            background: #ffffff;
            border-radius: 28px;
            width: 100%;
            height: 200px;
            margin: 1.5rem 0;
            cursor: crosshair;
            touch-action: none;
        }

        /* DATA INPUTS */
        .premium-textarea {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-stroke);
            border-radius: 24px;
            padding: 1.2rem;
            color: #fff;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        .premium-textarea:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        /* ACTION BUTTONS */
        .action-btn {
            all: unset;
            display: block;
            width: 100%;
            padding: 1.2rem 0;
            background: #fff;
            color: #000;
            border-radius: 22px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 1rem;
        }

        .action-btn:hover {
            transform: translateY(-4px);
            background: var(--accent-primary);
            box-shadow: 0 20px 40px oklch(75% 0.18 350 / 0.25);
        }

        .action-btn.secondary {
            background: transparent;
            color: #fff;
            border: 1px solid var(--glass-stroke);
        }

        /* 2026 BENTO DASHBOARD STYLES */
        .bento-grid {
            display: grid;
            gap: 1.5rem;
            text-align: left;
        }

        .bento-item {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid var(--glass-stroke);
        }

        .label-mini {
            font-size: 0.6rem;
            color: var(--accent-primary);
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: block;
        }

        /* UTILITIES */
        .hidden { display: none !important; }
        .blossom-script { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--accent-primary); }

        @keyframes laser-scan {
            0% { top: 0%; opacity: 1; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes haptic-shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, -2px); }
        }

        .shake { animation: haptic-shake 0.1s infinite; }
    </style>
</head>
<body>

    <canvas id="particle-engine"></canvas>
    <div id="dynamic-spotlight"></div>
    <div id="biometric-scanner"></div>

    <div class="access-overlay" id="master-auth">
        <div class="auth-card" id="auth-panel">
            <span id="greeting-label" class="status-label">System Initializing</span>
            <input type="password" class="passcode-input" id="vault-key" maxlength="4" placeholder="••••" inputmode="numeric" autofocus>
            <p style="font-size: 0.6rem; margin-top: 2rem; opacity: 0.4; letter-spacing: 2px;">SECURE HANDSHAKE REQUIRED</p>
        </div>
    </div>

    <audio id="ambient-audio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030c.mp3" type="audio/mpeg">
    </audio>

    <div class="vault-container" id="vault-primary">
        <div class="glass-module">
            <div id="narrative-engine">Handshake Protocol Accepted. <br>Welcome, Blossom.</div>
            <button class="action-btn" id="trigger-narrative">Initialize Sequence</button>
            
            <div id="post-narrative-ui" class="hidden">
                <div class="signature-module">
                    <span class="label-mini">Digital Seal</span>
                    <canvas id="signature-pad"></canvas>
                </div>
                <textarea class="premium-textarea" id="blossom-response" placeholder="Type your synchronization message..."></textarea>
                <button class="action-btn" style="background: var(--accent-primary);" onclick="handleSync('blossom_reply', 'blossom-response')">Commit to Vault ❤️</button>
            </div>
        </div>
    </div>

    <div class="vault-container" id="vault-secondary">
        <div class="glass-module">
            <h1 class="blossom-script" style="margin-bottom: 1.5rem;">Deep Space</h1>
            
            <div class="bento-grid">
                <div class="bento-item">
                    <span class="label-mini">Incoming Frequency</span>
                    <p id="remote-data-display" style="font-style: italic; line-height: 1.6; opacity: 0.9;">No incoming data detected.</p>
                </div>
                
                <div class="bento-item">
                    <span class="label-mini">Private Transmission</span>
                    <textarea class="premium-textarea" id="private-note-input" placeholder="Write a note only 2026 can see..."></textarea>
                    <button class="action-btn" style="background: var(--accent-primary); margin-top: 15px;" onclick="handleSync('deep_note', 'private-note-input')">Encrypt & Store</button>
                </div>
            </div>

            <button class="action-btn secondary" onclick="location.reload()" style="margin-top: 2rem;">Disconnect Session</button>
        </div>
    </div>

    <script>
        /**
         * 1. PHYSICS ENGINE: PARTICLE DRIFT
         * Creates the "Neural Network" background effect
         */
        const pCanvas = document.getElementById('particle-engine');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        
        function resize() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.size = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
            }
            draw() {
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fillStyle = "rgba(255, 255, 255, 0.15)";
                pCtx.fill();
            }
        }

        function initParticles() {
            resize();
            particles = Array.from({length: 60}, () => new Particle());
            animate();
        }

        function animate() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        /**
         * 2. INTERACTIVE UI LOGIC
         * Handles mouse tracking and time-based greetings
         */
        window.addEventListener('mousemove', e => {
            document.body.style.setProperty('--mouse-x', `${e.clientX}px`);
            document.body.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        const setGreeting = () => {
            const hour = new Date().getHours();
            const label = document.getElementById('greeting-label');
            if (hour < 12) label.innerText = "Good Morning, Blossom";
            else if (hour < 18) label.innerText = "Good Afternoon, Blossom";
            else label.innerText = "Good Evening, Blossom";
        };

        /**
         * 3. AUTHENTICATION & SCANNER ENGINE
         */
        const authInput = document.getElementById('vault-key');
        authInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val === '2025' || val === '2026') {
                authInput.blur();
                performBiometricScan(() => {
                    transitionVault(val === '2025' ? 'vault-primary' : 'vault-secondary');
                });
            }
        });

        function performBiometricScan(callback) {
            const scanner = document.getElementById('biometric-scanner');
            scanner.style.display = 'block';
            scanner.style.animation = 'laser-scan 1.4s forwards';
            
            // Visual "Haptic" Feedback
            document.getElementById('auth-panel').classList.add('shake');
            
            setTimeout(() => {
                document.getElementById('auth-panel').classList.remove('shake');
                document.getElementById('master-auth').style.opacity = '0';
                document.getElementById('master-auth').style.transform = 'translateY(-100%)';
                setTimeout(callback, 800);
            }, 1400);
        }

        function transitionVault(id) {
            const target = document.getElementById(id);
            target.classList.add('active');
            if (id === 'vault-secondary') loadDeepVaultData();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffffff', '#ff9a9e'] });
        }

        /**
         * 4. NARRATIVE & STORYTELLING ENGINE
         */
        const script = [
            "Hi Blossom...",
            "They say digital things have no soul.",
            "But I think this space is different.",
            "Because your frequency is woven into the code.",
            "Thank you for being a constant light. 🌸"
        ];

        document.getElementById('trigger-narrative').onclick = function() {
            this.classList.add('hidden');
            document.getElementById('ambient-audio').volume = 0.3;
            document.getElementById('ambient-audio').play();
            
            let i = 0;
            const engine = document.getElementById('narrative-engine');
            const run = () => {
                if (i < script.length) {
                    engine.style.opacity = 0;
                    setTimeout(() => {
                        engine.innerText = script[i];
                        engine.style.opacity = 1;
                        i++;
                        setTimeout(run, 3500);
                    }, 600);
                } else {
                    engine.innerHTML = "<span class='blossom-script'>The floor is yours.</span>";
                    document.getElementById('post-narrative-ui').classList.remove('hidden');
                    initSignatureEngine();
                }
            };
            run();
        };

        /**
         * 5. SIGNATURE & DATA PERSISTENCE
         */
        function initSignatureEngine() {
            const pad = document.getElementById('signature-pad');
            const ctx = pad.getContext('2d');
            pad.width = pad.offsetWidth;
            pad.height = pad.offsetHeight;
            
            let active = false;
            const getPos = (e) => {
                const rect = pad.getBoundingClientRect();
                return {
                    x: (e.clientX || e.touches[0].clientX) - rect.left,
                    y: (e.clientY || e.touches[0].clientY) - rect.top
                };
            };

            const start = (e) => { active = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { 
                if (!active) return; 
                const p = getPos(e); 
                ctx.lineTo(p.x, p.y); 
                ctx.strokeStyle = "#111111"; 
                ctx.lineWidth = 3; 
                ctx.lineCap = 'round'; 
                ctx.stroke(); 
            };
            const stop = () => active = false;

            pad.addEventListener('mousedown', start);
            pad.addEventListener('touchstart', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchend', stop);
        }

        function handleSync(key, inputId) {
            const val = document.getElementById(inputId).value;
            localStorage.setItem(key, val);
            if (key === 'blossom_reply') {
                localStorage.setItem('blossom_seal', document.getElementById('signature-pad').toDataURL());
            }
            confetti({ particleCount: 60, scalar: 0.8 });
            alert("Vault Synchronized. Data Locked.");
        }

        function loadDeepVaultData() {
            const reply = localStorage.getItem('blossom_reply');
            if (reply) document.getElementById('remote-data-display').innerText = `"${reply}"`;
            const note = localStorage.getItem('deep_note');
            if (note) document.getElementById('private-note-input').value = note;
        }

        // STARTUP
        window.onload = () => {
            initParticles();
            setGreeting();
            // Safety: Ensure input is clickable
            document.getElementById('vault-key').focus();
        };
    </script>
</body>
</html>
